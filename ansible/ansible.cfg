[defaults]
inventory = inventory
nocows = True
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
forks = 1
timeout = 30

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/tmp/known_hosts
pipelining = True
