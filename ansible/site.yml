---
- name: Manage ASUS Eee PC
  hosts: eeepc
  gather_facts: true
  gather_timeout: 30
  become: true

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Update systemd hwdb
      command: systemd-hwdb update

    - name: Reapply input device hwdb
      command: udevadm trigger --subsystem-match=input --action=change

  pre_tasks:
    - name: Show target summary
      debug:
        msg:
          - "host={{ inventory_hostname }} ansible_host={{ ansible_host }}"
          - "distribution={{ ansible_distribution }} {{ ansible_distribution_version }} {{ ansible_distribution_release }}"
          - "architecture={{ ansible_architecture }} pkg_arch={{ ansible_facts.userspace_architecture | default('unknown') }}"
          - "kernel={{ ansible_kernel }}"
      tags: [always]

    - name: Assert this playbook is aimed at Debian i386
      assert:
        that:
          - ansible_distribution == "Debian"
          - ansible_architecture in ["i386", "i686"]
        fail_msg: "This repo is intentionally scoped to the Debian i386 EeePC target."
        success_msg: "Target matches Debian i386 expectations."
      tags: [always]

  tasks:
    - name: Install baseline packages
      apt:
        name: "{{ eeepc_baseline_packages }}"
        state: present
        update_cache: true
      tags: [never, baseline, packages]

    - name: Ensure SSH service is enabled and running
      service:
        name: ssh
        enabled: true
        state: started
      tags: [never, baseline, ssh]

    - name: Install lightweight desktop packages
      apt:
        name: "{{ eeepc_desktop_packages }}"
        state: present
        update_cache: true
      tags: [never, desktop, packages]

    - name: Install LightDM packages
      apt:
        name: "{{ eeepc_lightdm_packages }}"
        state: present
        update_cache: true
      tags: [never, lightdm, packages]

    - name: Set default display manager file to LightDM
      copy:
        dest: /etc/X11/default-display-manager
        owner: root
        group: root
        mode: "0644"
        content: "/usr/sbin/lightdm\n"
      tags: [never, lightdm]

    - name: Point systemd display-manager alias at LightDM
      file:
        src: /lib/systemd/system/lightdm.service
        dest: /etc/systemd/system/display-manager.service
        state: link
        force: true
      notify: Reload systemd
      tags: [never, lightdm]

    - name: Check whether LightDM service unit is present
      stat:
        path: /lib/systemd/system/lightdm.service
      register: eeepc_lightdm_service_unit
      tags: [never, lightdm]

    - name: Reload systemd before switching display managers
      meta: flush_handlers
      tags: [never, lightdm]

    - name: Stop GDM after switching the display-manager alias
      service:
        name: gdm
        state: stopped
      failed_when: false
      when: eeepc_lightdm_service_unit.stat.exists
      tags: [never, lightdm]

    - name: Start LightDM display manager
      service:
        name: lightdm
        state: started
      when: eeepc_lightdm_service_unit.stat.exists
      tags: [never, lightdm]

    - name: Ensure LightDM drop-in config directory exists
      file:
        path: /etc/lightdm/lightdm.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: [never, lightdm]

    - name: Pin the default LightDM session to the EeePC Xsession
      copy:
        dest: /etc/lightdm/lightdm.conf.d/50-eeepc.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Seat:*]
          user-session={{ eeepc_default_session }}
      tags: [never, lightdm]

    - name: Install wrapper that runs ~/.xsession through sh
      copy:
        dest: /usr/local/bin/eeepc-xsession
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/sh
          set -eu

          if [ -r "$HOME/.xsession" ]; then
            exec /bin/sh "$HOME/.xsession"
          fi

          exec xterm
      tags: [never, xsession]

    - name: Install LightDM/Xsession desktop entry
      copy:
        dest: /usr/share/xsessions/eeepc-xsession.desktop
        owner: root
        group: root
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=EeePC Xsession
          Comment=Run ~/.xsession via /usr/local/bin/eeepc-xsession
          Exec=/usr/local/bin/eeepc-xsession
          Type=Application
      tags: [never, xsession]

    - name: Check for dotfiles .xsession.eee
      stat:
        path: "{{ eeepc_xsession_source }}"
      become: false
      register: eeepc_dotfiles_xsession
      tags: [never, xsession]

    - name: Link ~/.xsession to the pared-down dotfiles session
      file:
        src: "{{ eeepc_xsession_source }}"
        dest: "/home/{{ eeepc_user }}/.xsession"
        state: link
        force: true
        owner: "{{ eeepc_user }}"
        group: "{{ eeepc_user }}"
      when: eeepc_dotfiles_xsession.stat.exists
      tags: [never, xsession]

    - name: Warn when dotfiles .xsession.eee is missing
      debug:
        msg: "Dotfiles session not found at {{ eeepc_xsession_source }}; the wrapper will fall back to xterm."
      when: not eeepc_dotfiles_xsession.stat.exists
      tags: [never, xsession]

    - name: Ensure ~/.config exists
      file:
        path: "/home/{{ eeepc_user }}/.config"
        state: directory
        owner: "{{ eeepc_user }}"
        group: "{{ eeepc_user }}"
        mode: "0755"
      become: false
      tags: [never, awesome]

    - name: Check for dotfiles AwesomeWM config
      stat:
        path: "{{ eeepc_dotfiles_path }}/.config/awesome"
      become: false
      register: eeepc_dotfiles_awesome
      tags: [never, awesome]

    - name: Link ~/.config/awesome to dotfiles
      file:
        src: "{{ eeepc_dotfiles_path }}/.config/awesome"
        dest: "/home/{{ eeepc_user }}/.config/awesome"
        state: link
        force: true
        follow: false
        owner: "{{ eeepc_user }}"
        group: "{{ eeepc_user }}"
      when: eeepc_dotfiles_awesome.stat.exists
      become: false
      tags: [never, awesome]

    - name: Warn when dotfiles AwesomeWM config is missing
      debug:
        msg: "AwesomeWM config not found at {{ eeepc_dotfiles_path }}/.config/awesome; the session will fall back to the stock awesome config."
      when: not eeepc_dotfiles_awesome.stat.exists
      tags: [never, awesome]

    - name: Check for dotfiles .Xresources
      stat:
        path: "{{ eeepc_dotfiles_path }}/.Xresources"
      become: false
      register: eeepc_dotfiles_xresources
      tags: [never, xresources]

    - name: Link ~/.Xresources to dotfiles
      file:
        src: "{{ eeepc_dotfiles_path }}/.Xresources"
        dest: "/home/{{ eeepc_user }}/.Xresources"
        state: link
        force: true
        follow: false
        owner: "{{ eeepc_user }}"
        group: "{{ eeepc_user }}"
      when: eeepc_dotfiles_xresources.stat.exists
      become: false
      tags: [never, xresources]

    - name: Install evdev keyboard remap for the built-in keyboard
      copy:
        dest: /etc/udev/hwdb.d/90-eeepc-keyboard.hwdb
        owner: root
        group: root
        mode: "0644"
        content: |
          # ASUS Eee PC 1005HA built-in keyboard (AT Translated Set 2 keyboard).
          # evdev-level remaps so they apply everywhere -- X session, console VTs,
          # and early boot -- with no dependence on XKB or per-session config. This
          # mirrors the hwdb approach used on the workstation (Unicomp), translated
          # from USB HID usage codes to AT set-1 scancodes for this built-in keyboard.
          #
          # AT set-1 scancodes (kernel MSC_SCAN):
          #   3a = CapsLock   29 = Grave/tilde   01 = Escape   1d = LeftControl
          #
          # CapsLock -> Left Control  (no CapsLock remains; left Ctrl stays Ctrl)
          # Grave    -> Escape        (the key above Tab sends Esc)
          # Escape   -> Grave         (physical Esc sends ` / ~, preserving a backtick key)
          evdev:atkbd:dmi:bvn*:bvr*:bd*:svnASUSTeKComputerINC.:pn1005HA:*
           KEYBOARD_KEY_3a=leftctrl
           KEYBOARD_KEY_29=esc
           KEYBOARD_KEY_01=grave
      notify:
        - Update systemd hwdb
        - Reapply input device hwdb
      tags: [never, keyboard]

    - name: Disable selected heavyweight or blocking services
      service:
        name: "{{ item }}"
        enabled: false
        state: stopped
      loop: "{{ eeepc_services_to_disable }}"
      failed_when: false
      tags: [never, slim-services]

    - name: Mask selected blocking services
      systemd:
        name: "{{ item }}"
        masked: true
      loop: "{{ eeepc_services_to_mask }}"
      failed_when: false
      tags: [never, slim-services]
