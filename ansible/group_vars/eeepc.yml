---
eeepc_user: cwage
eeepc_dotfiles_path: "/home/{{ eeepc_user }}/git/cwage/dotfiles"

# Pared-down X session script for this hardware, kept in the dotfiles repo
# alongside the per-host variants (.xsession.thinkpad, etc.).
eeepc_xsession_source: "{{ eeepc_dotfiles_path }}/.xsession.eee"

# Session that LightDM should select by default, matching the desktop entry
# basename installed under /usr/share/xsessions.
eeepc_default_session: eeepc-xsession

# Per-host X resources for this hardware (bigger xterm font for the 1024x600
# panel), kept in dotfiles alongside the other per-host variants
# (.Xresources.thinkpad, etc.).
eeepc_xresources_source: "{{ eeepc_dotfiles_path }}/.Xresources.eee"

# Daily-driver GUI browser. Chromium is the only mainstream extension-capable
# browser Debian still builds for i386 (Brave/Chrome ship no 32-bit Linux
# binaries). Kept as a trial; firefox-esr stays installed as a fallback.
eeepc_browser_packages:
  - chromium

# Compressed RAM swap (zram-tools) to give the ~1 GB Atom headroom before it
# thrashes to the slow disk. lz4 keeps compression cheap on the weak N270;
# PERCENT is the share of RAM the zram device may advertise (real RAM use is
# the compressed footprint, typically 2-3x smaller).
eeepc_zram_algo: lz4
eeepc_zram_percent: 50

eeepc_baseline_packages:
  - btop
  - ca-certificates
  - curl
  - git
  - openssh-server
  - ripgrep
  - tmux
  - vim

eeepc_desktop_packages:
  - awesome
  - dbus-x11
  - feh
  - network-manager-gnome
  - policykit-1-gnome
  - udiskie
  - volumeicon-alsa
  - x11-xserver-utils
  - xautolock
  - xinit
  - xsecurelock
  - xss-lock
  - xterm

eeepc_lightdm_packages:
  - lightdm
  - lightdm-gtk-greeter

eeepc_services_to_disable:
  - NetworkManager-wait-online.service
  - plymouth-quit-wait.service

eeepc_services_to_mask:
  - NetworkManager-wait-online.service

# Background maintenance timers masked under the slim-services tag. On this slow
# Atom they fire apt cache refresh/upgrade and man-db index rebuilds at
# unpredictable times -- exactly when the machine then feels wedged. Updates are
# run by hand on this box, so the scheduled triggers are pure overhead.
eeepc_timers_to_mask:
  - apt-daily.timer
  - apt-daily-upgrade.timer
  - man-db.timer

# Performance tuning (tuning tag). With compressed zram swap at high priority,
# bias the kernel toward pushing cold anonymous pages into fast RAM-backed swap
# rather than evicting useful page cache. 100 leans hard on (cheap) zram first.
eeepc_vm_swappiness: 100

# earlyoom fires a targeted process kill before the kernel OOM killer reacts --
# on a ~1 GB box the in-kernel killer only steps in after the machine has already
# thrashed itself into a multi-minute freeze. Prefer killing browsers; never the
# session essentials. Regexes carry no spaces so systemd word-splitting of
# $EARLYOOM_ARGS keeps each pattern intact (do not wrap them in inner quotes).
eeepc_earlyoom_args: "-r 3600 --prefer (^|/)(chromium|chrome|firefox|firefox-esr) --avoid (^|/)(Xorg|awesome|xterm|sshd|systemd|lightdm)$"

